; CubeCell TX -> LoRa -> CubeCell RX -> Serial -> NodeMCU -> CRSF -> FC

[env:cubecell_rx]
platform = heltec-cubecell
board = cubecell_board_v2
framework = arduino
monitor_speed = 115200
build_src_filter = +<cubecell_rx.cpp>
build_flags = -D REGION_EU433

[env:cubecell_tx]
platform = heltec-cubecell
board = cubecell_board_v2
framework = arduino
monitor_speed = 115200
build_src_filter = +<cubecell_tx.cpp>
build_flags = -D REGION_EU433

[env:nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
build_src_filter = +<nodemcu_main.cpp> +<flash_light.cpp>
lib_deps = alfredosystems/AlfredoCRSF

[env:esp32c3_buttons]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
build_src_filter = +<esp32-c3-super-mini_buttons.cpp>
